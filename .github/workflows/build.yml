name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version_tag: ${{ steps.check.outputs.version_tag }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run version check script
      id: check
      run: python scripts/check_version.py

  auto_tag:
    name: Auto Tag Version
    runs-on: ubuntu-latest
    needs: check_version
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.check_version.outputs.version_changed == 'true'
    outputs:
      created_tag: ${{ needs.check_version.outputs.version_tag }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create tag if missing
      shell: bash
      run: |
        VERSION_TAG="${{ needs.check_version.outputs.version_tag }}"
        if git ls-remote --tags origin "refs/tags/$VERSION_TAG" | grep -q "$VERSION_TAG"; then
          echo "标签已存在: $VERSION_TAG，跳过创建。"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$VERSION_TAG"
        git push origin "$VERSION_TAG"
        echo "已创建并推送标签: $VERSION_TAG"

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: check_version
    if: always() && !cancelled() && needs.check_version.outputs.version_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    
    env:
      PYTHONIOENCODING: utf-8
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "nuitka[onefile]" pyinstaller

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        python scripts/build_nuitka.py
        python scripts/build_script.py --onefile

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        python scripts/build_nuitka.py
        
        # Find the generated .app bundle
        APP_PATH=$(find . -maxdepth 1 -name "*.app" -type d | head -n 1)
        APP_NAME=$(basename "$APP_PATH" .app)
        
        echo "Found app: $APP_PATH"
        echo "App Name: $APP_NAME"
        
        # Create DMG using hdiutil (standard macOS tool)
        hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$APP_NAME.dmg"
        
        # Zip the .app for alternative distribution
        # Use -r for recursive and -y to preserve symlinks (important for macOS apps)
        zip -r -y "$APP_NAME.zip" "$APP_PATH"

    - name: Upload Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: "dist/*.exe"
        if-no-files-found: error

    - name: Upload Artifacts (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: |
          *.dmg
          *.zip
          *.app
        if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check_version, build]
    if: |
      always() &&
      !cancelled() &&
      needs.build.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && needs.check_version.outputs.version_changed == 'true')
      )
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: "*-build"
        path: release-assets
        merge-multiple: true

    - name: Show release assets
      shell: bash
      run: |
        ls -lah release-assets

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ needs.check_version.outputs.version_tag }}
        artifacts: "release-assets/*"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
