name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto_tag:
    name: Auto Tag Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    outputs:
      created_tag: ${{ steps.detect_version.outputs.version_tag }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect version from config
      id: detect_version
      shell: bash
      run: |
        VERSION_TAG=$(python - <<'PY'
import re
from pathlib import Path
text = Path("src/core/config.py").read_text(encoding="utf-8")
match = re.search(r'APP_VERSION\s*=\s*["\']([^"\']+)["\']', text)
print(match.group(1) if match else "")
PY
)
        if [ -z "$VERSION_TAG" ]; then
          echo "未检测到 APP_VERSION，跳过自动打标签。"
          exit 0
        fi
        echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
        echo "检测到版本标签: $VERSION_TAG"

    - name: Create tag if missing
      if: steps.detect_version.outputs.version_tag != ''
      shell: bash
      run: |
        VERSION_TAG="${{ steps.detect_version.outputs.version_tag }}"
        if git ls-remote --tags origin "refs/tags/$VERSION_TAG" | grep -q "$VERSION_TAG"; then
          echo "标签已存在: $VERSION_TAG，跳过创建。"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$VERSION_TAG"
        git push origin "$VERSION_TAG"
        echo "已创建并推送标签: $VERSION_TAG"

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: "startsWith(github.ref, 'refs/tags/') || !contains(github.event.head_commit.message, 'chore: bump version')"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    
    env:
      PYTHONIOENCODING: utf-8
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "nuitka[onefile]"

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        python scripts/build_nuitka.py

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        python scripts/build_nuitka.py
        
        # Find the generated .app bundle
        APP_PATH=$(find . -maxdepth 1 -name "*.app" -type d | head -n 1)
        APP_NAME=$(basename "$APP_PATH" .app)
        
        echo "Found app: $APP_PATH"
        echo "App Name: $APP_NAME"
        
        # Create DMG using hdiutil (standard macOS tool)
        hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$APP_NAME.dmg"
        
        # Zip the .app for alternative distribution
        # Use -r for recursive and -y to preserve symlinks (important for macOS apps)
        zip -r -y "$APP_NAME.zip" "$APP_PATH"

    - name: Upload Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: "dist/*.exe"
        if-no-files-found: error

    - name: Upload Artifacts (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: |
          *.dmg
          *.zip
          *.app
        if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: "*-build"
        path: release-assets
        merge-multiple: true

    - name: Show release assets
      shell: bash
      run: |
        ls -lah release-assets

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release-assets/*"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
